const Badge = ({ children, type = "neutral", style: s = {} }) => {
  const map = {
    neutral: { bg: "#F0EDE8", color: "#6B6B65" },
    veg: { bg: "#EDFAF2", color: "#2D7A4F" },
    nonveg: { bg: "#FEECEC", color: "#C0392B" },
    accent: { bg: "#FFF3EC", color: "#E8470A" },
    free: { bg: "#EDFAF2", color: "#2D7A4F" },
  };
  const t = map[type] || map.neutral;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 600, padding: "3px 9px", borderRadius: 6, background: t.bg, color: t.color, letterSpacing: "0.01em", ...s }}>
      {children}
    </span>
  );
};

const VegDot = ({ veg }) => (
  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 15, height: 15, border: `1.5px solid ${veg ? "#2D7A4F" : "#C0392B"}`, borderRadius: 3, flexShrink: 0 }}>

);

const QtyControl = ({ qty, onInc, onDec, compact = false }) => {
  const h = compact ? 32 : 36;
  const w = compact ? 30 : 34;
  return (
    <div style={{ display: "flex", alignItems: "center", border: "1.5px solid var(--accent)", borderRadius: 10, overflow: "hidden", flexShrink: 0 }}>
      <button onClick={onDec} style={{ width: w, height: h, background: "var(--accent-lt)", border: "none", color: "var(--accent)", fontSize: 17, cursor: "pointer", fontWeight: 700, lineHeight: 1 }}>−</button>
      <span style={{ width: compact ? 24 : 28, textAlign: "center", fontSize: compact ? 12 : 13, fontWeight: 700, color: "var(--accent)" }}>{qty}</span>
      <button onClick={onInc} style={{ width: w, height: h, background: "var(--accent)", border: "none", color: "#fff", fontSize: 17, cursor: "pointer", fontWeight: 700, lineHeight: 1 }}>+</button>
    </div>
  );
};

const Divider = ({ style: s = {} }) => <div style={{ height: 1, background: "var(--border)", ...s }} />;

const MediaThumb = ({ src, alt, size = 40, radius = 12, style: s = {} }) => (

const Section = ({ title, subtitle, action, children, style: s = {} }) => (

/* â”€â”€â”€ RESTAURANT CARD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

        <div style={{ display: "flex", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)", padding: "16px 0", marginBottom: 24, gap: 0 }}>
          {[
            { v: r.rating, s: `${r.reviewCount} reviews`, c: "#E09B00", isRating: true },
            { v: `${r.time} min`, s: "delivery time", c: "var(--text)" },
            { v: r.deliveryFee === 0 ? "Free" : fmt(r.deliveryFee), s: "delivery fee", c: r.deliveryFee === 0 ? "var(--success)" : "var(--text)" },
          ].map((item, i) => (
            <div key={item.s} style={{ flex: 1, textAlign: "center", borderLeft: i > 0 ? "1px solid var(--border)" : "none" }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: item.c, display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                {item.isRating && <Icon.Star />}{item.v}
              </div>
              <div style={{ fontSize: 11.5, color: "var(--muted)", marginTop: 3 }}>{item.s}</div>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 4, scrollbarWidth: "none" }}>
          {r.menu.map((s) => (
            <button key={s.section} onClick={() => scrollTo(s.section)}
              style={{ flexShrink: 0, padding: "7px 16px", borderRadius: 50, border: `1.5px solid ${activeSection === s.section ? r.accent : "var(--border)"}`, background: activeSection === s.section ? r.hero : "transparent", color: activeSection === s.section ? r.accent : "var(--muted)", fontSize: 12.5, fontWeight: activeSection === s.section ? 600 : 400, cursor: "pointer" }}>
              {s.section}
            </button>
          ))}
        </div>
      </div>

      {r.menu.map((section) => (
        <div key={section.section} ref={(el) => (sectionRefs.current[section.section] = el)} style={{ padding: "0 28px" }}>
          <div style={{ margin: "28px -28px 0", padding: "8px 28px", background: "var(--bg)", borderTop: "1px solid var(--border)", borderBottom: "1px solid var(--border)" }}>
            <h2 className="f-serif" style={{ fontSize: 17, fontWeight: 600, scrollMarginTop: 72, color: "var(--text)" }}>{section.section}</h2>
          </div>
          {section.items.map((item) => {
            const qty = getItemQty(item.id);
            return (
              <div key={item.id} style={{ display: "flex", gap: 16, padding: "18px 0", borderBottom: "1px solid var(--border)", alignItems: "center" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                    <VegDot veg={item.veg} />
                    <span style={{ fontWeight: 600, fontSize: 14.5, color: "var(--text)" }}>{item.name}</span>
                  </div>
                  <p style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.6, marginBottom: 10 }}>{item.desc}</p>
                  <span style={{ fontWeight: 700, fontSize: 15, color: "var(--text)" }}>{fmt(item.price)}</span>
                </div>
                {qty === 0 ? (
                  <button onClick={() => addToCart(item, r)}
                    style={{ flexShrink: 0, padding: "9px 22px", border: "1.5px solid var(--accent)", borderRadius: 10, background: "var(--accent-lt)", color: "var(--accent)", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    Add
                  </button>
                ) : (
                  <QtyControl qty={qty} onDec={() => updateQty(item.id, -1)} onInc={() => addToCart(item, r)} />
                )}
              </div>
            );
          })}
        </div>
      ))}

      {cartCount > 0 && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 100, width: "min(calc(100% - 48px), 688px)" }}>
          <button onClick={onViewCart}
            style={{ width: "100%", padding: "16px 24px", background: "var(--accent)", color: "#fff", border: "none", borderRadius: 16, fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 8px 36px rgba(232,71,10,0.42)" }}>
            <span style={{ background: "rgba(255,255,255,0.2)", borderRadius: 8, padding: "2px 10px", fontSize: 13 }}>{cartCount} item{cartCount > 1 ? "s" : ""}</span>
            <span>View Cart</span>
            <span>{fmt(cartTotal)}</span>
          </button>
        </div>
      )}
    </div>
  );
}

/* â”€â”€â”€ CART PAGE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function CartPage({ cart, updateQty, cartTotal, deliveryFee, platformFee, onCheckout, onBrowse, restaurantName }) {

      <p style={{ color: "var(--muted)", marginBottom: 32, fontSize: 14 }}>Add something delicious to get started</p>
      <button onClick={onBrowse} style={{ background: "var(--accent)", color: "#fff", border: "none", borderRadius: 12, padding: "13px 32px", fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 14px rgba(232,71,10,0.28)" }}>

      <div style={{ background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid var(--border)", overflow: "hidden", marginBottom: 14 }}>
        {cart.map((item, i) => (
          <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "15px 16px", borderBottom: i < cart.length - 1 ? "1px solid var(--border)" : "none" }}>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>{item.name}</div>
              <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{fmt(item.price)} each</div>
            </div>

      <div style={{ background: "var(--success-lt)", border: "1px solid #B5DECA", borderRadius: 12, padding: "13px 16px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }}>

        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--success)" }}>Best offer applied</div>

        </div>

      <div style={{ background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid var(--border)", padding: "18px 18px", marginBottom: 22 }}>
        <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 14 }}>Price Breakdown</p>
        {[
          ["Item total", fmt(cartTotal)],
          ["Delivery fee", deliveryFee === 0 ? <span style={{ color: "var(--success)", fontWeight: 700 }}>FREE</span> : fmt(deliveryFee)],
          ["Platform fee", fmt(platformFee)],

          <div key={label} style={{ display: "flex", justifyContent: "space-between", marginBottom: 10, fontSize: 14 }}>
            <span style={{ color: "var(--muted)" }}>{label}</span>
            <span style={{ fontWeight: 500, color: "var(--text)" }}>{val}</span>

        <Divider style={{ margin: "12px 0" }} />
        <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 17 }}>
          <span>Total</span>
          <span style={{ color: "var(--accent)" }}>{fmt(grand)}</span>
        </div>
        <p style={{ fontSize: 11.5, color: "var(--muted)", marginTop: 10, display: "flex", alignItems: "center", gap: 4 }}>
          <span style={{ color: "var(--success)", fontWeight: 700, display: "flex" }}><Icon.Check /></span> No hidden charges — {fmt(grand)} is the final amount

/* â”€â”€â”€ CHECKOUT PAGE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function CheckoutPage({ cart, cartTotal, deliveryFee, platformFee, onPlace, onBack }) {
  const [step, setStep] = useState(1);
  const [payment, setPayment] = useState("upi");
  const grand = cartTotal + deliveryFee + platformFee;
  const STEPS = ["Delivery", "Payment", "Confirm"];

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "40px 26px 72px" }} className="fade-up">
      <div style={{ display: "flex", alignItems: "center", marginBottom: 40 }}>
        {STEPS.map((s, i) => {
          const n = i + 1, done = step > n, active = step === n;
          return (
            <div key={s} style={{ display: "flex", alignItems: "center", flex: i < STEPS.length - 1 ? 1 : "none" }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, background: done ? "var(--success)" : active ? "var(--accent)" : "var(--border)", color: done || active ? "#fff" : "var(--muted)" }}>
                  {done ? <Icon.Check /> : n}
                </div>
                <span style={{ fontSize: 11, fontWeight: active ? 700 : 400, color: active ? "var(--text)" : "var(--muted)", whiteSpace: "nowrap" }}>{s}</span>
              </div>
              {i < STEPS.length - 1 && (
                <div style={{ flex: 1, height: 2, background: step > n ? "var(--success)" : "var(--border)", margin: "0 8px", marginBottom: 18 }} />
              )}
            </div>
          );
        })}
      </div>

      {step === 1 && (
        <div>
          <h2 className="f-serif" style={{ fontSize: 23, fontWeight: 700, marginBottom: 22, color: "var(--text)" }}>Delivery details</h2>
          <div style={{ background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid var(--border)", padding: "18px", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 13 }}>
              <span style={{ fontWeight: 600, fontSize: 13, color: "var(--text)" }}>Saved address</span>
              <button style={{ background: "none", border: "none", color: "var(--accent)", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Change</button>
            </div>
            <div style={{ background: "var(--accent-lt)", borderRadius: 10, padding: "13px 14px", border: "1.5px solid var(--accent)" }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 3, color: "var(--text)", display: "flex", alignItems: "center", gap: 6 }}>
                <Icon.Home /> Home · Chirag Jotwani
              </div>
              <div style={{ fontSize: 12, color: "var(--muted)" }}>14, Vidhyadhar Nagar, Jaipur — 302023</div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              {["Leave at door", "Call me", "Ring bell"].map((opt, i) => (
                <button key={opt} style={{ flex: 1, padding: "8px 4px", borderRadius: 8, fontSize: 11, fontWeight: 500, cursor: "pointer", border: `1.5px solid ${i === 0 ? "var(--accent)" : "var(--border)"}`, background: i === 0 ? "var(--accent-lt)" : "transparent", color: i === 0 ? "var(--accent)" : "var(--muted)" }}>
                  {opt}
                </button>
              ))}
            </div>
          </div>
          <div style={{ background: "var(--card)", borderRadius: 12, padding: "14px 16px", border: "1px solid var(--border)", marginBottom: 26, display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ color: "var(--muted)" }}><Icon.Clock /></span>
            <div>
              <div style={{ fontWeight: 600, fontSize: 13.5, color: "var(--text)" }}>Estimated delivery: 22–30 minutes</div>
              <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>From order confirmation</div>
            </div>
          </div>
          <button onClick={() => setStep(2)} style={{ width: "100%", padding: 16, background: "var(--accent)", color: "#fff", border: "none", borderRadius: 14, fontSize: 15, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 16px rgba(232,71,10,0.28)" }}>
            Continue to payment →
          </button>
          <button onClick={onBack} style={{ width: "100%", padding: 13, marginTop: 10, background: "transparent", border: "1.5px solid var(--border)", borderRadius: 12, fontSize: 14, color: "var(--muted)", cursor: "pointer" }}>
            ← Back to cart
          </button>
        </div>
      )}

      {step === 2 && (
        <div>
          <h2 className="f-serif" style={{ fontSize: 23, fontWeight: 700, marginBottom: 22, color: "var(--text)" }}>Payment</h2>
          <div style={{ background: "var(--accent-lt)", borderRadius: 12, padding: "16px 18px", marginBottom: 22, border: "1px solid #F5C9AE" }}>
            <p style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--accent)", marginBottom: 12 }}>Total you'll pay</p>
            {[["Items", fmt(cartTotal)], ["Delivery + fee", fmt(deliveryFee + platformFee)]].map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, marginBottom: 7 }}>
                <span style={{ color: "var(--muted)" }}>{l}</span><span style={{ color: "var(--text)", fontWeight: 500 }}>{v}</span>
              </div>
            ))}
            <Divider style={{ margin: "10px 0", background: "#F5C9AE" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 18 }}>
              <span>Total</span><span style={{ color: "var(--accent)" }}>{fmt(grand)}</span>

          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>

              { id: "upi", label: "UPI", sub: "Pay via any UPI app", icon: <Icon.Phone /> },
              { id: "card", label: "Credit / Debit Card", sub: "Visa, Mastercard, RuPay", icon: <Icon.CreditCard /> },
              { id: "cod", label: "Cash on Delivery", sub: "Pay when order arrives", icon: <Icon.Cash /> },
            ].map((opt) => (
              <div key={opt.id} onClick={() => setPayment(opt.id)}
                style={{ display: "flex", alignItems: "center", gap: 13, padding: "15px 16px", border: `1.5px solid ${payment === opt.id ? "var(--accent)" : "var(--border)"}`, borderRadius: 12, background: payment === opt.id ? "var(--accent-lt)" : "var(--card)", cursor: "pointer", transition: "border-color 0.15s, background 0.15s" }}>
                <span style={{ color: payment === opt.id ? "var(--accent)" : "var(--muted)" }}>{opt.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)" }}>{opt.label}</div>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{opt.sub}</div>
                </div>
                <div style={{ width: 20, height: 20, borderRadius: "50%", border: `2px solid ${payment === opt.id ? "var(--accent)" : "var(--border)"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {payment === opt.id && <div style={{ width: 9, height: 9, borderRadius: "50%", background: "var(--accent)" }} />}
                </div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setStep(1)} style={{ flex: 1, padding: 14, background: "transparent", border: "1.5px solid var(--border)", borderRadius: 12, fontSize: 14, cursor: "pointer", color: "var(--text)" }}>← Back</button>
            <button onClick={() => setStep(3)} style={{ flex: 2, padding: 14, background: "var(--accent)", color: "#fff", border: "none", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 14px rgba(232,71,10,0.28)" }}>Review order →</button>
          </div>
        </div>
      )}

      {step === 3 && (
        <div>
          <h2 className="f-serif" style={{ fontSize: 23, fontWeight: 700, marginBottom: 22, color: "var(--text)" }}>Confirm order</h2>
          <div style={{ background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid var(--border)", overflow: "hidden", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "13px 16px", borderBottom: "1px solid var(--border)", background: "var(--bg)" }}>
              <span style={{ fontWeight: 700, fontSize: 13, color: "var(--text)" }}>Your items</span>
              <button onClick={() => setStep(1)} style={{ background: "none", border: "none", color: "var(--accent)", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Edit</button>
            </div>
            {cart.map((item) => (
              <div key={item.id} style={{ display: "flex", justifyContent: "space-between", padding: "11px 16px", borderBottom: "1px solid var(--border)", fontSize: 13.5 }}>
                <span style={{ color: "var(--muted)", fontWeight: 500 }}>{item.qty}×</span>
                <span style={{ flex: 1, marginLeft: 10, color: "var(--text)" }}>{item.name}</span>
                <span style={{ fontWeight: 600, color: "var(--text)" }}>{fmt(item.price * item.qty)}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", padding: "15px 16px", fontWeight: 700, fontSize: 17 }}>
              <span>Total</span>
              <span style={{ color: "var(--accent)" }}>{fmt(grand)}</span>
            </div>
          </div>

          <div style={{ background: "var(--success-lt)", borderRadius: 10, padding: "13px 16px", marginBottom: 24, border: "1px solid #B5DECA", fontSize: 13.5, color: "var(--success)", fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon.Check />
            <span>No hidden charges — {fmt(grand)} is exactly what you'll pay</span>
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setStep(2)} style={{ flex: 1, padding: 14, background: "transparent", border: "1.5px solid var(--border)", borderRadius: 12, fontSize: 14, cursor: "pointer", color: "var(--text)" }}>← Back</button>
            <button onClick={onPlace} style={{ flex: 2, padding: 15, background: "var(--accent)", color: "#fff", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 20px rgba(232,71,10,0.38)" }}>
              Place Order · {fmt(grand)}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* â”€â”€â”€ TRACKING PAGE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function TrackingPage({ onDone }) {
  const [step, setStep] = useState(1);
  useEffect(() => {
    const t1 = setTimeout(() => setStep(2), 2500);
    const t2 = setTimeout(() => setStep(3), 6000);
    const t3 = setTimeout(() => setStep(4), 11000);
    return () => [t1, t2, t3].forEach(clearTimeout);
  }, []);

  const STEPS = [
    { label: "Order confirmed", sub: "Restaurant received your order", icon: <Icon.Check />, image: TRACKING_IMAGES.confirmed },
    { label: "Preparing your food", sub: "Being freshly made just for you", icon: <Icon.Chef />, image: TRACKING_IMAGES.preparing },
    { label: "Out for delivery", sub: "Your rider is on the way!", icon: <Icon.Moped />, image: TRACKING_IMAGES.delivery },
    { label: "Delivered!", sub: "Enjoy your meal!", icon: <Icon.Party />, image: TRACKING_IMAGES.delivered },
  ];

  const orderId = useRef(`SB-${Math.floor(Math.random() * 900000 + 100000)}`);

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "48px 26px 72px" }} className="fade-up">
      <div style={{ textAlign: "center", marginBottom: 44 }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
          <MediaThumb
            src={STEPS[step - 1].image}
            alt={STEPS[step - 1].label}
            size={92}
            radius={28}
            style={{ boxShadow: "0 18px 40px rgba(0,0,0,0.12)" }}
          />
        </div>
        <h1 className="f-serif" style={{ fontSize: 29, fontWeight: 700, marginBottom: 8, color: "var(--text)" }}>{STEPS[step - 1].label}</h1>
        <p style={{ color: "var(--muted)", fontSize: 14 }}>{STEPS[step - 1].sub}</p>
        {step < 4 && (
          <p style={{ color: "var(--accent)", fontWeight: 600, fontSize: 13.5, marginTop: 10 }}>
            ~{(4 - step) * 5} min remaining
          </p>
        )}
      </div>

      <div style={{ background: "var(--card)", borderRadius: "var(--radius)", border: "1px solid var(--border)", padding: "22px 22px", marginBottom: 18 }}>
        {STEPS.map((s, i) => {
          const n = i + 1, done = step > n, active = step === n;
          return (
            <div key={s.label} style={{ display: "flex", gap: 14 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, background: done ? "var(--success)" : active ? "var(--accent)" : "var(--border)", color: done || active ? "#fff" : "var(--muted)", transition: "background 0.3s" }}>
                  {done ? <Icon.Check /> : active && step < 4 ? <span className="spin" style={{ display: "block", width: 13, height: 13, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%" }} /> : n}
                </div>
                {i < STEPS.length - 1 && (
                  <div style={{ width: 2, flex: 1, minHeight: 20, background: done ? "var(--success)" : "var(--border)", margin: "4px 0", transition: "background 0.4s" }} />
                )}
              </div>
              <div style={{ paddingTop: 7, paddingBottom: i < STEPS.length - 1 ? 22 : 0 }}>
                <div style={{ fontWeight: active ? 700 : done ? 500 : 400, fontSize: 14, color: active ? "var(--accent)" : done ? "var(--text)" : "var(--muted)" }}>{s.label}</div>
                {(done || active) && <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 3 }}>{s.sub}</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ background: "var(--card)", borderRadius: 12, padding: "14px 17px", border: "1px solid var(--border)", marginBottom: 26, display: "flex", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 3 }}>Order ID</div>
          <div style={{ fontWeight: 700, fontSize: 14, fontFamily: "monospace", color: "var(--text)" }}>{orderId.current}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 3 }}>Delivering to</div>
          <div style={{ fontWeight: 600, fontSize: 13, color: "var(--text)" }}>Home · Jaipur</div>
        </div>
      </div>

      {step === 4 && (
        <button onClick={onDone} style={{ width: "100%", padding: 16, background: "var(--accent)", color: "#fff", border: "none", borderRadius: 14, fontSize: 15, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 16px rgba(232,71,10,0.28)" }}>
          Back to home
        </button>
      )}
    </div>
  );
}

/* â”€â”€â”€ ROOT APP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function App() {
  const [page, setPage] = useState("home");
  const [selectedRestaurant, setSelectedRestaurant] = useState(null);
  const [cart, setCart] = useState([]);
  const [searchQuery, setSearchQuery] = useState("");
  const [activeCategory, setActiveCategory] = useState("all");
  const [filters, setFilters] = useState({ rating: 0, vegOnly: false, freeDelivery: false, sortBy: "recommended" });
  const [orderPlaced, setOrderPlaced] = useState(false);

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const deliveryFee = selectedRestaurant?.deliveryFee ?? 0;
  const platformFee = cart.length > 0 ? 15 : 0;

  const addToCart = (item, restaurant) => {
    setSelectedRestaurant(restaurant);
    setCart((prev) => {
      const ex = prev.find((i) => i.id === item.id);
      if (ex) return prev.map((i) => (i.id === item.id ? { ...i, qty: i.qty + 1 } : i));
      return [...prev, { ...item, qty: 1 }];
    });
  };

  const updateQty = (id, delta) => {
    setCart((prev) => prev.map((i) => i.id === id ? { ...i, qty: i.qty + delta } : i).filter((i) => i.qty > 0));
  };

  const getItemQty = (id) => cart.find((i) => i.id === id)?.qty || 0;

  const filteredRestaurants = RESTAURANTS.filter((r) => {
    if (activeCategory !== "all" && r.category !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!r.name.toLowerCase().includes(q) && !r.tags.some((t) => t.toLowerCase().includes(q))) return false;
    }
    if (filters.vegOnly && !r.veg) return false;
    if (r.rating < filters.rating) return false;
    if (filters.freeDelivery && r.deliveryFee !== 0) return false;
    return true;
  });

  if (orderPlaced) return (
    <>
      <GlobalStyles />
      <Nav page="tracking" setPage={setPage} cartCount={0} cartTotal={0} />
      <TrackingPage onDone={() => { setOrderPlaced(false); setCart([]); setPage("home"); }} />
    </>
  );

  return (
    <>
      <GlobalStyles />
      <Nav page={page} setPage={setPage} cartCount={cartCount} cartTotal={cartTotal} />

      {page === "home" && (
        <HomePage
          searchQuery={searchQuery} setSearchQuery={setSearchQuery}
          activeCategory={activeCategory} setActiveCategory={setActiveCategory}
          restaurants={filteredRestaurants}
          onSelectRestaurant={(r) => { setSelectedRestaurant(r); setPage("restaurant"); }}
          setPage={setPage}
        />
      )}
      {page === "listing" && (
        <ListingPage
          restaurants={filteredRestaurants}
          filters={filters} setFilters={setFilters}
          activeCategory={activeCategory} setActiveCategory={setActiveCategory}
          onSelectRestaurant={(r) => { setSelectedRestaurant(r); setPage("restaurant"); }}
          searchQuery={searchQuery} setSearchQuery={setSearchQuery}
        />
      )}
      {page === "restaurant" && selectedRestaurant && (
        <RestaurantPage
          restaurant={selectedRestaurant}
          addToCart={addToCart} updateQty={updateQty} getItemQty={getItemQty}
          cartCount={cartCount} cartTotal={cartTotal}
          onViewCart={() => setPage("cart")}
          onBack={() => setPage("listing")}
        />
      )}
      {page === "cart" && (
        <CartPage
          cart={cart} updateQty={updateQty}
          cartTotal={cartTotal} deliveryFee={deliveryFee} platformFee={platformFee}
          onCheckout={() => setPage("checkout")}
          onBrowse={() => setPage(selectedRestaurant ? "restaurant" : "listing")}
          restaurantName={selectedRestaurant?.name}
        />
      )}
      {page === "checkout" && (
        <CheckoutPage
          cart={cart} cartTotal={cartTotal} deliveryFee={deliveryFee} platformFee={platformFee}
          onPlace={() => setOrderPlaced(true)}
          onBack={() => setPage("cart")}
        />
      )}
    </>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>
</body>
